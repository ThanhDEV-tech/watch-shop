services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-watchora}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: ${MYSQL_ALLOW_EMPTY_PASSWORD:-yes}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${MYSQL_ROOT_PASSWORD}\" ]; then mysqladmin ping -h localhost -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent; else mysqladmin ping -h localhost -uroot --silent; fi",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: watchora-php:dev
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-watchora}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      QUEUE_CONNECTION: database
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    command: ["sh", "/usr/local/bin/watchora-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/categories | grep -Eq '\"success\"[[:space:]]*:[[:space:]]*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: watchora-php:dev
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-watchora}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      QUEUE_CONNECTION: database
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=90", "--sleep=3"]

  frontend:
    image: node:22
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ""
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
  backend_vendor:
  frontend_node_modules:

